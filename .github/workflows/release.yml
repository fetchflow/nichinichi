name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # arm64 (Apple Silicon)
            args: '--target aarch64-apple-darwin'
            rust-targets: aarch64-apple-darwin
          - platform: macos-13       # x86_64 (Intel)
            args: '--target x86_64-apple-darwin'
            rust-targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: Nichinichi ${{ github.ref_name }}
          releaseBody: |
            Download the installer for your platform from the assets below.

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `Nichinichi_*_aarch64.dmg` |
            | macOS (Intel) | `Nichinichi_*_x64.dmg` |
            | Windows | `Nichinichi_*_x64-setup.exe` |
            | Linux (Debian/Ubuntu) | `nichinichi_*_amd64.deb` |
            | Linux (universal) | `nichinichi_*_amd64.AppImage` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
