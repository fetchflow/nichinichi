name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # arm64 (Apple Silicon)
            args: '--target aarch64-apple-darwin'
            rust-targets: aarch64-apple-darwin
            cli-target: '--target aarch64-apple-darwin'
            cli-binary: target/aarch64-apple-darwin/release/nichinichi
            cli-asset-name: nichinichi-aarch64-apple-darwin
          - platform: macos-latest   # x86_64 (Intel, cross-compiled from arm64)
            args: '--target x86_64-apple-darwin'
            rust-targets: x86_64-apple-darwin
            cli-target: '--target x86_64-apple-darwin'
            cli-binary: target/x86_64-apple-darwin/release/nichinichi
            cli-asset-name: nichinichi-x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
            cli-target: ''
            cli-binary: target/release/nichinichi
            cli-asset-name: nichinichi-x86_64-linux
          - platform: windows-latest
            args: ''
            rust-targets: ''
            cli-target: ''
            cli-binary: target/release/nichinichi.exe
            cli-asset-name: nichinichi-x86_64-windows.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Bump version from tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: make bump-version

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: Nichinichi ${{ github.ref_name }}
          releaseBody: |
            Download the installer for your platform from the assets below.

            ### Desktop app
            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `Nichinichi_*_aarch64.dmg` |
            | macOS (Intel) | `Nichinichi_*_x64.dmg` |
            | Windows | `Nichinichi_*_x64-setup.exe` |
            | Linux (Debian/Ubuntu) | `nichinichi_*_amd64.deb` |
            | Linux (universal) | `nichinichi_*_amd64.AppImage` |

            ### CLI (`nichinichi` binary)
            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `nichinichi-aarch64-apple-darwin` |
            | macOS (Intel) | `nichinichi-x86_64-apple-darwin` |
            | Linux | `nichinichi-x86_64-linux` |
            | Windows | `nichinichi-x86_64-windows.exe` |

            Install: download the binary for your platform, make it executable (`chmod +x nichinichi-*` on macOS/Linux), and move it to a directory on your `$PATH`.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build CLI binary
        if: startsWith(github.ref, 'refs/tags/')
        run: cargo build -p nichinichi-cli --release ${{ matrix.cli-target }}

      - name: Upload CLI binary to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp ${{ matrix.cli-binary }} ${{ matrix.cli-asset-name }}
          gh release upload ${{ github.ref_name }} ${{ matrix.cli-asset-name }} --clobber

  publish-update:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=${TAG#v}

          # Wait briefly for all assets to be attached (tauri-action uploads async)
          sleep 10

          ASSETS=$(gh release view "$TAG" --json assets -q '.assets')

          get_url() {
            echo "$ASSETS" | jq -r --arg n "$1" '.[] | select(.name | test($n)) | .url' | head -1
          }
          get_sig() {
            URL=$(get_url "$1")
            [ -z "$URL" ] && echo "" && return
            curl -sL -H "Authorization: Bearer $GITHUB_TOKEN" "$URL"
          }

          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq -n \
            --arg version "$VERSION" \
            --arg notes "See https://github.com/${{ github.repository }}/releases/tag/$TAG" \
            --arg pub_date "$PUB_DATE" \
            --arg darwin_aarch64_sig "$(get_sig 'Nichinichi.*aarch64.*\.sig$')" \
            --arg darwin_aarch64_url "$(get_url 'Nichinichi.*aarch64.*\.tar\.gz$')" \
            --arg darwin_x64_sig "$(get_sig 'Nichinichi.*x64.*\.sig$')" \
            --arg darwin_x64_url "$(get_url 'Nichinichi.*x64.*\.tar\.gz$')" \
            --arg linux_sig "$(get_sig 'nichinichi.*amd64.*\.AppImage\.sig$')" \
            --arg linux_url "$(get_url 'nichinichi.*amd64.*\.AppImage$')" \
            --arg windows_sig "$(get_sig 'Nichinichi.*x64.*setup\.exe\.sig$')" \
            --arg windows_url "$(get_url 'Nichinichi.*x64.*setup\.exe$')" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $darwin_aarch64_sig, url: $darwin_aarch64_url },
                "darwin-x86_64":  { signature: $darwin_x64_sig,     url: $darwin_x64_url     },
                "linux-x86_64":   { signature: $linux_sig,           url: $linux_url           },
                "windows-x86_64": { signature: $windows_sig,         url: $windows_url         }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Push latest.json to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages 2>/dev/null || true
          git checkout --orphan gh-pages-deploy
          git rm -rf . --quiet
          cp latest.json .
          git add latest.json
          git commit -m "chore: update latest.json for ${{ github.ref_name }}"
          git push origin HEAD:gh-pages --force
