name: Feature request
description: Propose a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a request, check if there's already an open issue covering this.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the limitation you're running into?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Desktop app
        - Parser / file format
        - Sync / SQLite
        - AI
        - Documentation
        - Other
    validations:
      required: true
